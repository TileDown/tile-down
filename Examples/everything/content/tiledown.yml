# Everything example site for the browser test suite. Small and self-contained,
# but intentionally broad: every shipped browser-visible TileDown surface should
# have at least one page here.
title: Everything Example
versionName: Complete Fixture
baseURL: https://example.com/browser-fixture
theme: standard
theme.light.accent: #0057d8
theme.light.radius: 6px
theme.dark.accent: #66aaff
theme.dark.surface: #101820
appearance: toggle
fontScale: 1.02
latestPosts: 3
rss: true
rssTitle: Everything Example
rssDescription: A fixture site for the browser test suite.
shareLinks: true
showSource: true
articlePDF: true
social.github: https://github.com/TileDown/tile-down
social.linkedin: https://www.linkedin.com/company/tiledown
social.bluesky: https://bsky.app/profile/tiledown.com
social.mastodon: https://mastodon.social/@tiledown
links.docs: https://tiledown.com/docs/
service.calculator.contract: contracts/calculator.json
service.calculator.mode: proxy
service.calculator.proxyRoute: /_td/services/calculator
notFoundRedirect.exact./legacy-post: /posts/live/
notFoundRedirect.prefix./old-tags/special/: /posts/live/
notFoundRedirect.prefix./old-tags/: /tags/
static.CNAME: deployment/CNAME
static.robots.txt: deployment/robots.txt
static.images: public/images
static..nojekyll: deployment/.nojekyll
static..well-known: public/.well-known
