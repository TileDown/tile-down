# Fixture site for the browser test suite. Small and self-contained; it exists
# only to exercise the features the Playwright checks assert against.
title: Browser Fixture
baseURL: https://example.com/browser-fixture
theme: standard
theme.light.accent: #0057d8
theme.light.radius: 6px
theme.dark.accent: #66aaff
theme.dark.surface: #101820
appearance: toggle
rss: true
rssTitle: Browser Fixture
rssDescription: A fixture site for the browser test suite.
shareLinks: true
showSource: true
notFoundRedirect.exact./legacy-post: /posts/live/
notFoundRedirect.prefix./old-tags/special/: /posts/live/
notFoundRedirect.prefix./old-tags/: /tags/
static.CNAME: deployment/CNAME
static.robots.txt: deployment/robots.txt
static.images: public/images
static..nojekyll: deployment/.nojekyll
static..well-known: public/.well-known
