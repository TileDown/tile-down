name: CI

# Mechanical gates. Linux also runs the Playwright browser gate because the
# engine targets Linux and the generated site has browser-visible behavior.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  style:
    name: Style and namespacing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Style gate (no em dashes, no tool attribution)
        run: bash scripts/check-style.sh
      - name: Namespacing gate (one type per file)
        run: bash scripts/check-namespacing.sh

  swift-macos:
    name: Swift (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Format, lint, build, test
        run: |
          brew install swiftformat swiftlint
          swiftformat . --config .swiftformat --lint
          swiftlint --config .swiftlint.yml --strict
          cd Packages && swift build && swift test

  swift-linux:
    name: Swift (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v6
      - name: Build and test
        run: |
          cd Packages && swift build && swift test

  browser-linux:
    name: Browser (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v6
      - name: Install Playwright
        run: |
          apt-get update
          apt-get install -y curl lsof python3 python3-pip
          python3 -m pip install --break-system-packages playwright || python3 -m pip install playwright
          python3 -m playwright install --with-deps chromium
      - name: Browser fixture
        run: |
          PYTHON=python3 Packages/Tests/Browser/run.sh
