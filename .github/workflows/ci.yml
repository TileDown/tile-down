name: CI

on:
  push:
    branches: [main]
  pull_request:

# Mirrors the gates enforced locally by .githooks/pre-push: build and test the
# Swift package on Linux and macOS, and run the repo style, namespacing,
# swiftformat, and swiftlint checks. See docs/rules and AGENTS.md.

jobs:
  linux:
    name: Linux (Swift 6.1)
    runs-on: ubuntu-latest
    container: swift:6.1.2
    defaults:
      run:
        working-directory: Packages
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  macos:
    name: macOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Packages
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  lint:
    name: Lint and format
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Repo style and namespacing
        run: |
          bash scripts/check-style.sh
          bash scripts/check-namespacing.sh
      - name: Install SwiftFormat and SwiftLint
        run: brew install swiftformat swiftlint
      - name: SwiftFormat (lint)
        run: swiftformat . --config .swiftformat --lint
      - name: SwiftLint (strict)
        run: swiftlint --config .swiftlint.yml --strict
