# Mechanical enforcement of the code rules a machine can decide
# (engineering.md principle: no force-unwrap in shipping code).
#
# Inert until Swift sources exist. The CI workflow that runs swiftlint plus
# build plus test ships with the engine package.
opt_in_rules:
  - force_unwrapping
disabled_rules:
  - trailing_comma
excluded:
  - Packages/.build
  - Examples/aleahim
  # The SwiftPM manifest is a declarative target list that grows with the
  # package; file/line-length limits target source readability, not manifests.
  - Packages/Package.swift
force_unwrapping: error
force_try: error
force_cast: error
